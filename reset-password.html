<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Fair Friend</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #2196F3 0%, #64B5F6 35%, #1B5E3B 68%, #2D7A47 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .logo { width: 200px; margin-bottom: 24px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 12px; }
    p { font-size: 15px; font-weight: 600; color: #555555; line-height: 1.6; margin-bottom: 16px; }
    label { display: block; text-align: left; font-size: 12px; font-weight: 800; color: #555555; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Nunito', Arial, sans-serif;
      font-weight: 600;
      color: #333333;
      background: #fafafa;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #38B2F5;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Nunito', Arial, sans-serif;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { font-size: 14px; font-weight: 700; margin-top: 16px; }
    .message.success { color: #16A34A; }
    .message.error { color: #DC2626; }
    .footer { font-size: 12px; font-weight: 600; color: #aaaaaa; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://raw.githubusercontent.com/FairFriendApp/Images/main/FF_Logo_With_Transparency.png" alt="Fair Friend">
    <div class="icon">🔑</div>
    <h1>Reset Your Password</h1>
    <p>Enter and confirm your new password below.</p>

    <label for="password">New Password</label>
<div style="position:relative; margin-bottom:16px;">
  <input type="password" id="password" placeholder="Enter new password" style="margin-bottom:0; padding-right:60px;">
  <button type="button" onclick="toggleVisibility('password', this)" style="position:absolute !important; right:12px; top:50%; transform:translateY(-50%); width:auto !important; padding:0 !important; background:none !important; color:#1565C0; font-size:12px; font-weight:800; margin:0 !important;">SHOW</button>
</div>

<label for="confirm">Confirm New Password</label>
<div style="position:relative; margin-bottom:16px;">
  <input type="password" id="confirm" placeholder="Re-enter new password" style="margin-bottom:0; padding-right:60px;">
  <button type="button" onclick="toggleVisibility('confirm', this)" style="position:absolute !important; right:12px; top:50%; transform:translateY(-50%); width:auto !important; padding:0 !important; background:none !important; color:#1565C0; font-size:12px; font-weight:800; margin:0 !important;">SHOW</button>
</div>

    <button id="submitBtn" onclick="handleReset()">Update Password</button>

    <div id="message" class="message"></div>

    <p class="footer">Return to the Fair Friend app to sign in after resetting your password.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://ocjodcnsqlnpvacmtwys.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jam9kY25zcWxucHZhY210d3lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDgzNDcsImV4cCI6MjA4OTUyNDM0N30.WRSRT8FPSL-NINzN6zelXpHaV5t7HwXm9u5xK7b9ELc';

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Extract tokens from URL hash
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken) {
      client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }

    function toggleVisibility(fieldId, btn) {
  const input = document.getElementById(fieldId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'HIDE';
  } else {
    input.type = 'password';
    btn.textContent = 'SHOW';
  }
}

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      msg.textContent = '';
      msg.className = 'message';

      if (!password || !confirm) {
        msg.textContent = 'Please fill in both fields.';
        msg.className = 'message error';
        return;
      }
      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'message error';
        return;
      }
      if (password.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        msg.textContent = error.message;
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msg.textContent = '✅ Password updated! Return to the Fair Friend app to sign in.';
        msg.className = 'message success';
        btn.disabled = true;
        btn.textContent = 'Password Updated';
      }
    }
  </script>
</body>
</html>
